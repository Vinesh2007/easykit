<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyKit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1 class="logo">⚡ EasyKit</h1>
    <p class="tagline">Your offline toolkit</p>
  </div>

  <!-- Tool Grid -->
  <div class="tool-grid">

    <button class="tool-card" id="btn-calculator">
      <span class="tool-icon">🧮</span>
      <span class="tool-name">Calculator</span>
    </button>

    <button class="tool-card" id="btn-qr">
      <span class="tool-icon">🔲</span>
      <span class="tool-name">QR Generator</span>
    </button>

    <button class="tool-card" id="btn-unit">
      <span class="tool-icon">📐</span>
      <span class="tool-name">Unit Converter</span>
    </button>

    <button class="tool-card" id="btn-clock">
      <span class="tool-icon">🕐</span>
      <span class="tool-name">World Clock</span>
    </button>

    <button class="tool-card" id="btn-timer">
      <span class="tool-icon">⏱️</span>
      <span class="tool-name">Timer</span>
    </button>

    <button class="tool-card" id="btn-password">
      <span class="tool-icon">🔐</span>
      <span class="tool-name">Password</span>
    </button>

    <button class="tool-card" id="btn-color">
      <span class="tool-icon">🎨</span>
      <span class="tool-name">Color Picker</span>
    </button>

    <button class="tool-card" id="btn-word">
      <span class="tool-icon">📝</span>
      <span class="tool-name">Word Counter</span>
    </button>

    <button class="tool-card" id="btn-notes">
      <span class="tool-icon">🗒️</span>
      <span class="tool-name">Quick Notes</span>
    </button>

  </div>

  <!-- Footer -->
  <div class="footer">
    <p>v1.0.0 &nbsp;•&nbsp; 100% Offline</p>
  </div>

  <script src="popup.js"></script>

</body>
</html>
