<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Timer</h1>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="input-section">
      <input type="number" id="hours" placeholder="Hours" min="0">
      <input type="number" id="minutes" placeholder="Minutes" min="0" max="59">
      <input type="number" id="seconds" placeholder="Seconds" min="0" max="59">
    </div>
    <div class="buttons">
      <button id="startBtn" class="btn start">Start</button>
      <button id="pauseBtn" class="btn pause">Pause</button>
      <button id="resetBtn" class="btn reset">Reset</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
