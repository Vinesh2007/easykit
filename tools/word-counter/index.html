<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Word Counter</h1>
    <textarea id="textInput" placeholder="Enter or paste your text here..."></textarea>
    <div class="stats">
      <div class="stat">
        <span class="label">Words:</span>
        <span class="value" id="wordCount">0</span>
      </div>
      <div class="stat">
        <span class="label">Characters:</span>
        <span class="value" id="charCount">0</span>
      </div>
      <div class="stat">
        <span class="label">Characters (no spaces):</span>
        <span class="value" id="charCountNoSpaces">0</span>
      </div>
      <div class="stat">
        <span class="label">Sentences:</span>
        <span class="value" id="sentenceCount">0</span>
      </div>
      <div class="stat">
        <span class="label">Paragraphs:</span>
        <span class="value" id="paragraphCount">0</span>
      </div>
      <div class="stat">
        <span class="label">Reading Time:</span>
        <span class="value" id="readingTime">0 min</span>
      </div>
    </div>
    <button id="clearBtn" class="clear-btn">Clear</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
