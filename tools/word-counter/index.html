<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter — EasyKit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <button id="btn-back" class="back-btn">&#8592;</button>
    <span class="tool-title">Word Counter</span>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-value" id="stat-words">0</span>
      <span class="stat-label">Words</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="stat-chars">0</span>
      <span class="stat-label">Chars</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="stat-chars-no">0</span>
      <span class="stat-label">No Spaces</span>
    </div>
    <div class="stat-card">
      <span class="stat-value" id="stat-sentences">0</span>
      <span class="stat-label">Sentences</span>
    </div>
  </div>

  <!-- Extra Stats -->
  <div class="extra-stats">
    <div class="extra-row">
      <span class="extra-label">Paragraphs</span>
      <span class="extra-value" id="stat-para">0</span>
    </div>
    <div class="extra-row">
      <span class="extra-label">Reading Time</span>
      <span class="extra-value" id="stat-read">0 sec</span>
    </div>
    <div class="extra-row">
      <span class="extra-label">Avg Word Length</span>
      <span class="extra-value" id="stat-avg">0</span>
    </div>
  </div>

  <!-- Textarea -->
  <div class="textarea-section">
    <textarea
      id="text-input"
      class="text-input"
      placeholder="Start typing or paste your text here..."
      spellcheck="true"
    ></textarea>
    <button class="btn-clear" id="btn-clear">✕ Clear</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
